<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>うさうさ育成ごっち｜データ分析・BI・Tableau 🐰 v3.1.0</title>
<!-- Version: usausa-ikusei-gotchi v3.1.0 (2026-06-14) -->
<style>
  :root{
    --shell:#F6C9D6; --shell-2:#EFB3C8; --shell-edge:#DD9CB2;
    --coral-1:#F8BD92; --coral-2:#EE8E5E; --coral-3:#E2674A; --cream:#FFF6EE;
    --carrot:#EE8A3C; --grass:#6FA844; --gold:#F2C14E;
    --paper:#FFF8EF; --text:#2E2A26; --muted:#7C766C; --line:#E7D9C6;
    --btn:#F7E0A8; --btn-edge:#D9B96F;
    --display:"Hiragino Maru Gothic ProN","Quicksand","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    --body:"Hiragino Sans","Yu Gothic","Noto Sans JP","Meiryo",system-ui,sans-serif;
    --mono:ui-monospace,"DejaVu Sans Mono","SFMono-Regular",Menlo,monospace;
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0}
  body{font-family:var(--body);color:var(--text);
    background:radial-gradient(120% 90% at 18% -10%, #fff6fa 0%, transparent 55%),
      radial-gradient(120% 90% at 100% 0%, #fef0e6 0%, transparent 52%),
      linear-gradient(160deg,#fbeef3 0%, #f7f1ec 50%, #fdeede 100%);
    background-color:#f6efe9;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:18px 14px 40px;-webkit-font-smoothing:antialiased}
  .brandbar{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:10px;text-align:center}
  .brandbar .kicker{font-family:var(--display);font-weight:700;letter-spacing:.14em;font-size:11px;color:var(--shell-edge)}
  .brandbar h1{font-family:var(--display);font-weight:800;margin:0;font-size:clamp(19px,5vw,26px);color:#5a4a52}
  .brandbar .tagline{font-size:11px;color:var(--muted)}

  .device{width:min(360px,94vw);position:relative;padding:26px 22px 22px;
    background:linear-gradient(160deg,var(--shell) 0%, var(--shell-2) 70%, var(--shell-edge) 100%);
    border-radius:46px 46px 52px 52px / 40px 40px 90px 90px;
    box-shadow:0 22px 44px -18px rgba(160,90,120,.55), inset 0 3px 0 rgba(255,255,255,.65), inset 0 -10px 22px rgba(160,90,120,.28)}
  .antenna{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:18px;height:18px}
  .antenna::before{content:"";position:absolute;left:8px;top:6px;width:2px;height:12px;background:var(--shell-edge);border-radius:2px}
  .antenna::after{content:"♥";position:absolute;left:50%;top:-7px;transform:translateX(-50%);color:#fff;font-size:11px;
    background:var(--shell-edge);width:18px;height:18px;border-radius:50%;display:grid;place-items:center;line-height:1}
  .etch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
  .etch .name{font-family:var(--display);font-weight:800;font-size:12px;color:#9a5d75;letter-spacing:.04em}
  .etch .ver{font-family:var(--mono);font-size:10px;color:#b07f93}

  .screen-frame{background:linear-gradient(180deg,#9c7488,#7d5a6c);border-radius:18px;padding:8px;box-shadow:inset 0 2px 6px rgba(0,0,0,.4)}
  .lcd{position:relative;border-radius:11px;height:214px;overflow:hidden;
    background:radial-gradient(120% 105% at 50% 32%, var(--coral-1) 0%, var(--coral-2) 56%, var(--coral-3) 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
  .lcd::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(110% 70% at 50% 0%, rgba(255,255,255,.28), transparent 60%)}
  .lcd-top{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;z-index:3;
    font-family:var(--mono);font-size:10px;color:#fff;text-shadow:0 1px 1px rgba(180,90,60,.5)}
  .lcd-top .stage{font-weight:700}.lcd-top .clock{opacity:.85}
  .pet-wrap{position:absolute;inset:0;display:grid;place-items:center;z-index:2}
  .pet{width:150px;height:150px;animation:bob 2.8s ease-in-out infinite;transform-origin:50% 92%}
  .pet svg{display:block;width:100%;height:100%}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .pet.hop{animation:hop .55s ease}
  @keyframes hop{0%{transform:translateY(0)}30%{transform:translateY(-20px)}55%{transform:translateY(0)}70%{transform:translateY(-8px)}100%{transform:translateY(0)}}
  .float{position:absolute;z-index:4;font-size:22px;animation:floatUp 1.15s ease forwards;pointer-events:none}
  @keyframes floatUp{0%{opacity:0;transform:translateY(6px) scale(.7)}25%{opacity:1}100%{opacity:0;transform:translateY(-40px) scale(1.15)}}
  .mood{position:absolute;top:34px;left:50%;transform:translateX(40px);z-index:3;font-size:17px}
  .zzz{position:absolute;top:46px;left:50%;transform:translateX(36px);z-index:3;color:#fff;font-family:var(--mono);font-size:14px;
    text-shadow:0 1px 1px rgba(180,90,60,.5);animation:bob 2.8s ease-in-out infinite}
  .lcd-flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:6;pointer-events:none}
  .lcd-flash.go{animation:flash .6s ease}
  @keyframes flash{0%{opacity:0}15%{opacity:.8}30%{opacity:0}45%{opacity:.65}60%{opacity:0}}
  .gauges{position:absolute;bottom:9px;left:10px;right:10px;z-index:3;display:flex;flex-direction:column;gap:5px}
  .gauge{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9px;color:#fff;text-shadow:0 1px 1px rgba(180,90,60,.45)}
  .gauge .lab{width:38px;flex:0 0 auto}
  .bar{flex:1;height:9px;border-radius:999px;background:rgba(255,255,255,.35);position:relative;overflow:hidden}
  .bar > i{position:absolute;inset:0;width:0%;background:#fff;border-radius:999px;transition:width .4s ease}
  .gauge .num{width:28px;text-align:right;flex:0 0 auto}

  .wallet{display:flex;justify-content:center;gap:12px;margin:12px 0 4px}
  .coin{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.6);border:1.5px solid rgba(221,156,178,.5);
    padding:5px 12px;border-radius:999px;font-weight:800;font-family:var(--mono);font-size:14px;color:#6b4b58}
  .coin .ico{font-size:16px}.coin.neck{color:#9a5d75}

  .buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px}
  .pbtn{appearance:none;border:none;cursor:pointer;font-family:var(--display);font-weight:800;
    background:linear-gradient(180deg,#fdeec0,var(--btn));color:#7a5a18;border-radius:16px;padding:12px 6px 14px;font-size:13px;
    box-shadow:0 4px 0 var(--btn-edge),0 6px 10px -4px rgba(160,120,40,.5);
    transition:transform .06s ease, box-shadow .06s ease;display:flex;flex-direction:column;align-items:center;gap:3px}
  .pbtn .ic{font-size:18px;line-height:1}.pbtn .sub{font-family:var(--mono);font-size:9px;color:#a98637;font-weight:700}
  .pbtn:active{transform:translateY(4px);box-shadow:0 0 0 var(--btn-edge),0 2px 6px -2px rgba(160,120,40,.5)}
  .pbtn[aria-pressed="true"]{background:linear-gradient(180deg,#ffe39a,#f6cf6e);box-shadow:0 2px 0 var(--btn-edge),inset 0 2px 6px rgba(160,120,40,.35);transform:translateY(2px)}
  .subnav{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .subbtn{appearance:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:12px;color:#a85a78;
    background:rgba(255,255,255,.7);border:1.5px solid var(--shell-edge);border-radius:999px;padding:8px 13px}
  .subbtn:active{transform:translateY(1px)}
  .subbtn[aria-pressed="true"]{background:#fff;box-shadow:inset 0 0 0 1.5px var(--coral-2);color:#c4651f}

  .panel{width:min(460px,94vw);background:var(--paper);border:1px solid var(--line);border-radius:20px;margin-top:16px;
    padding:16px 16px 18px;box-shadow:0 14px 30px -20px rgba(120,80,90,.5);min-height:120px}
  .panel h2{font-family:var(--display);font-weight:800;margin:0 0 4px;font-size:15px;color:#6b4b58;display:flex;align-items:center;gap:7px}
  .panel h3.sec{font-family:var(--display);font-weight:800;font-size:13px;color:#a85a78;margin:16px 0 7px;display:flex;align-items:center;gap:6px;
    padding-top:12px;border-top:1px dashed #ecdcc9}
  .panel .muted{color:var(--muted);font-size:12.5px;line-height:1.7}
  .chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;border:1.5px solid;letter-spacing:.03em}
  .chip.cat{color:#6b4b58;border-color:#e3c6d3;background:#fdf1f6}
  .chip.easy{color:var(--grass);border-color:#cfe3b8;background:#f3f8ea}
  .chip.hard{color:#c4651f;border-color:#f3d6b4;background:#fdf2e6}
  .chip.prog{color:#a85a78;border-color:#e9c4d5;background:#fdf2f7}
  .chip.cnt{color:#5a7a8a;border-color:#c4d8e3;background:#eef6fa}

  .q-head{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
  .q-text{font-size:15px;font-weight:700;line-height:1.6;color:#3a332e;margin:2px 0 12px}
  .choices{display:flex;flex-direction:column;gap:8px}
  .choice{text-align:left;font-family:var(--body);font-size:14px;color:#3a332e;cursor:pointer;background:#fff;border:1.5px solid var(--line);
    border-radius:12px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start;transition:border-color .12s,background .12s,transform .06s}
  .choice .key{font-family:var(--mono);font-weight:800;color:#b8889a;flex:0 0 auto}
  .choice:hover{border-color:#e6b9cb;background:#fff8fb}.choice:active{transform:scale(.99)}.choice:disabled{cursor:default}
  .choice.correct{border-color:var(--grass);background:#eef7e3}.choice.correct .key{color:var(--grass)}
  .choice.wrong{border-color:#e08f8f;background:#fdeeee}.choice.wrong .key{color:#cc6a6a}
  .reward{margin-top:12px;text-align:center;font-family:var(--display);font-weight:800;font-size:16px;color:#6b8a3f}
  .reward.miss{color:#b07f93}
  .exp{margin-top:12px;border:1px dashed #e0cdb6;border-radius:14px;overflow:hidden;background:#fffdf7}
  .exp .row{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid #f0e6d6;font-size:13px;line-height:1.65}
  .exp .row:last-child{border-bottom:none}
  .exp .tag{flex:0 0 auto;width:54px;font-family:var(--display);font-weight:800;font-size:11px;color:#a07c5a;padding-top:1px}
  .exp .row.tatoe{background:#fdf6fa}.exp .row.tatoe .tag{color:#b8728f}
  .exp .row.hito{background:#f7faef}.exp .row.hito .tag{color:#7a9a3f}.exp .row.hito .body{font-weight:800;color:#4d5a2f}
  .next{margin-top:14px;width:100%;appearance:none;border:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:15px;color:#fff;
    background:linear-gradient(180deg,#f3a85f,var(--carrot));border-radius:13px;padding:12px;box-shadow:0 4px 0 #cf7026}
  .next:active{transform:translateY(3px);box-shadow:0 1px 0 #cf7026}
  .next.alt{background:linear-gradient(180deg,#8fc36a,var(--grass));box-shadow:0 4px 0 #4f7d2c}
  .next.alt:active{box-shadow:0 1px 0 #4f7d2c}

  .feed-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .food{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:16px;padding:14px 10px;text-align:center;
    transition:transform .07s,border-color .12s;display:flex;flex-direction:column;gap:5px;align-items:center}
  .food .big{font-size:34px;line-height:1}.food .nm{font-family:var(--display);font-weight:800;font-size:14px;color:#5a4a52}
  .food .eff{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.5}.food .have{font-family:var(--mono);font-size:11px;font-weight:800;color:#6b4b58}
  .food.carrot{border-color:#f3d6b4}.food.carrot:hover{border-color:var(--carrot);background:#fff8f1}
  .food.grass{border-color:#d8e8c2}.food.grass:hover{border-color:var(--grass);background:#f6faee}
  .food:active{transform:scale(.97)}.food:disabled{opacity:.45;cursor:not-allowed}

  .stat-portrait{display:flex;gap:14px;align-items:center;margin:4px 0 12px}
  .stat-portrait .mini{width:92px;height:92px;flex:0 0 auto;border-radius:16px;overflow:hidden;
    background:radial-gradient(120% 105% at 50% 32%, var(--coral-1), var(--coral-3));box-shadow:inset 0 0 0 2px #7d5a6c}
  .stat-portrait .mini svg{width:100%;height:100%}
  .stat-portrait .meta h3{font-family:var(--display);font-weight:800;margin:0 0 3px;font-size:18px;color:#5a4a52}
  .stat-portrait .meta p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.6}
  .xpbar{height:14px;border-radius:999px;background:#eee2d2;overflow:hidden;margin:4px 0;border:1px solid #e7d4bd}
  .xpbar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#f3a85f,var(--carrot));transition:width .5s ease}
  .xp-cap{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:right}
  .record{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
  .rec{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 2px;text-align:center}
  .rec b{display:block;font-family:var(--mono);font-size:17px;color:#6b4b58}.rec span{font-size:10px;color:var(--muted)}
  .neck-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .neck{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:7px 11px;display:flex;align-items:center;gap:6px;
    font-size:12.5px;font-weight:700;color:#6b4b58;transition:transform .06s,border-color .12s}
  .neck .em{font-size:17px}.neck.owned:hover{border-color:var(--coral-2);background:#fff7f1}
  .neck.locked{opacity:.4;cursor:default}
  .neck.eq{border-color:var(--coral-2);box-shadow:inset 0 0 0 1px var(--coral-2);background:#fff3ea}
  .neck.eq::after{content:"装着中";font-family:var(--mono);font-size:9px;color:var(--coral-3);margin-left:2px}

  .field{margin-top:8px}
  .field label{display:block;font-size:11.5px;font-weight:700;color:#8a6b76;margin-bottom:3px}
  .field input,.field select,.field textarea{width:100%;font-family:var(--body);font-size:13px;color:#3a332e;
    border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;background:#fffdf8}
  .field textarea{min-height:60px;resize:vertical;line-height:1.6}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#e6b9cb}
  .field.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .field.row2 > div{min-width:0}
  .choicefields{display:grid;grid-template-columns:auto 1fr;gap:6px 8px;align-items:center;margin-top:4px}
  .choicefields .ck{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;color:#a85a78}
  .choicefields input[type=text]{padding:7px 9px}

  .exp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:8px}
  .exp-btn{cursor:pointer;appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:11px 8px;
    display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .06s,border-color .12s}
  .exp-btn .em{font-size:20px}.exp-btn .t{font-family:var(--display);font-weight:800;font-size:12.5px;color:#5a4a52}
  .exp-btn .s{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
  .exp-btn:hover{border-color:var(--coral-2);background:#fff8f2}.exp-btn:active{transform:scale(.98)}

  .hist{margin-top:10px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .hist .h-row{display:flex;gap:8px;padding:8px 11px;border-bottom:1px solid #f1e7d8;font-size:12px;align-items:center}
  .hist .h-row:last-child{border-bottom:none}
  .hist .h-row .mk{flex:0 0 auto;font-size:14px}
  .hist .h-row .when{flex:0 0 auto;font-family:var(--mono);font-size:10px;color:var(--muted);width:78px}
  .hist .h-row .what{flex:1;color:#4a423b;line-height:1.4}
  .hist .h-row .ct{flex:0 0 auto;font-family:var(--mono);font-size:9px;color:#a07c5a}
  .hist-empty{font-size:12.5px;color:var(--muted);text-align:center;padding:14px}
  .gen-row{display:flex;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-top:6px;font-size:12.5px;align-items:flex-start}
  .gen-row .gq{flex:1;color:#3a332e;line-height:1.5}.gen-row .ga{flex:0 0 auto;font-family:var(--mono);font-size:10px;color:var(--grass)}

  .row-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .ghost{appearance:none;cursor:pointer;font-family:var(--display);font-weight:800;font-size:12.5px;background:#fff;border:1.5px solid var(--line);
    color:#8a6b76;border-radius:11px;padding:9px 13px}
  .ghost:active{transform:translateY(1px)}
  .ghost.danger{color:#c46a6a;border-color:#eccaca}.ghost.ok{color:#5d7a33;border-color:#cfe3b8}
  .ghost.primary{color:#fff;background:linear-gradient(180deg,#f3a85f,var(--carrot));border-color:#cf7026}
  .ghost.primary:disabled{opacity:.5;cursor:not-allowed}
  .memo-card{background:#f6faef;border:1px solid #e0eccf;border-radius:14px;padding:11px 13px;margin-top:6px}
  .memo-card h4{margin:0 0 6px;font-family:var(--display);font-weight:800;font-size:12.5px;color:#5d7a33;display:flex;align-items:center;gap:6px}
  .memo-card ul{margin:0;padding-left:16px}.memo-card li{font-size:12px;line-height:1.75;color:#4a5535}
  .memo-card li b{color:#3f6b16}.memo-card .note{font-size:10.5px;color:#8a9a6a;margin-top:7px;font-family:var(--mono)}
  .welcome{font-size:13.5px;line-height:1.85;color:#5a534b}.welcome b{color:#6b4b58}
  .legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;gap:5px;align-items:center}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#5a4a52;color:#fff;
    font-family:var(--display);font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:50;max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{margin-top:18px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7;max-width:460px}
  footer .quote{font-family:var(--display);color:#9a5d75}

  #printArea{display:none}
  @media print{body>*{display:none!important}body>#printArea{display:block!important;position:absolute;left:0;top:0;width:100%;padding:24px;font-family:var(--body);color:#222}
    #printArea h1{font-size:20px;margin:0 0 4px}#printArea h2{font-size:14px;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px}
    #printArea table{width:100%;border-collapse:collapse;font-size:11px}#printArea th,#printArea td{border:1px solid #ccc;padding:4px 6px;text-align:left}
    #printArea .sum li{margin:2px 0;font-size:12px}}
  @media (prefers-reduced-motion: reduce){.pet,.zzz{animation:none}.pet.hop{animation:none}.float{animation-duration:.01s}.lcd-flash.go{animation:none}}
</style>
</head>
<body>
  <div class="brandbar">
    <div class="kicker">うさうさ研修工房</div>
    <h1>うさうさ育成ごっち 🐰</h1>
    <div class="tagline">データ分析・BI・Tableauをまなんで、人参うさぎを育てよう</div>
  </div>

  <div class="device" role="application" aria-label="うさうさ育成ごっち本体">
    <div class="antenna" aria-hidden="true"></div>
    <div class="etch"><span class="name">USAUSA-GOTCHI</span><span class="ver" id="dayCount">DAY 1</span></div>
    <div class="screen-frame">
      <div class="lcd" id="lcd">
        <div class="lcd-top"><span class="stage" id="lcdStage">たまご</span><span class="clock" id="lcdClock">--:--</span></div>
        <div class="pet-wrap"><div class="pet" id="pet" aria-hidden="true"></div></div>
        <div id="moodLayer"></div>
        <div class="gauges">
          <div class="gauge"><span class="lab">まんぷく</span><div class="bar"><i id="barFull"></i></div><span class="num" id="numFull">100</span></div>
          <div class="gauge"><span class="lab">きげん</span><div class="bar"><i id="barMood"></i></div><span class="num" id="numMood">100</span></div>
        </div>
        <div class="lcd-flash" id="flash"></div>

var actx=null;
function beep(freq,dur,type,vol){freq=freq||660;dur=dur||0.07;type=type||"square";vol=vol||0.05;if(!S.sound)return;
  try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    var o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;
    o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);o.stop(actx.currentTime+dur+0.02);
  }catch(err){}}

function save(){S.last=Date.now();try{localStorage.setItem("usausa_gotchi_v3",JSON.stringify(S));}catch(err){}}
function load(){
  var s={};for(var k in DEFAULT){s[k]=DEFAULT[k];}
  try{var raw=localStorage.getItem("usausa_gotchi_v3");if(raw){var p=JSON.parse(raw);for(var kk in p){s[kk]=p[kk];}}}catch(err){}
  if(!s.history)s.history=[];if(!s.necklaces)s.necklaces=[];if(!s.asked)s.asked=[];if(!s.customQ)s.customQ=[];if(typeof s.memo!=="string")s.memo="";
  if(!s.srs||typeof s.srs!=="object")s.srs={};
  // asked は問題文配列。古い数値は破棄。
  s.asked=s.asked.filter(function(x){return typeof x==="string";});
  var away=Math.min(40,Math.floor((Date.now()-(s.last||Date.now()))/600000));
  if(away>0){s.full=Math.max(0,s.full-away);if(s.full<30)s.mood=Math.max(0,s.mood-Math.floor(away/2));}
  return s;
}
function logHist(en){S.history.push(en);if(S.history.length>400)S.history=S.history.slice(-400);}

/* ===== 間隔反復（固定間隔 1→3→7→16日）===== */
var SRS_DAY=86400000;
var SRS_INTERVALS=[1,3,7,16];
function startOfDay(t){var d=new Date(t);d.setHours(0,0,0,0);return d.getTime();}
function isSeen(q){return !!S.srs[q];}
function isDue(q){var r=S.srs[q];return !!(r&&!r.graduated&&typeof r.due==="number"&&r.due<=Date.now());}
function srsUpdate(q,correct){
  var r=S.srs[q]||{box:0,due:0,graduated:false};
  if(correct){
    r.box=r.box+1;
    if(r.box>SRS_INTERVALS.length){r.graduated=true;r.due=null;}
    else{r.graduated=false;r.due=startOfDay(Date.now())+SRS_INTERVALS[r.box-1]*SRS_DAY;}
  }else{ r.box=1;r.graduated=false;r.due=startOfDay(Date.now())+SRS_DAY; } // まちがい→翌日
  S.srs[q]=r;
}
function dueCount(){var all=ALLQ(),n=0;for(var i=0;i<all.length;i++){if(isDue(all[i].q))n++;}return n;}
function dueBadge(){var n=dueCount();return n>0?'<div class="muted" style="margin-top:6px"><span class="chip prog">🔁 今日の復習 '+n+'問</span> 期限が来た問題を まなぶ／チャレンジ で優先出題します。</div>':"";}

var activeTab=null;
function setTab(tab){activeTab=tab;
  ["btnLearn","btnFeed","btnStatus","btnChal","btnRec","btnQ"].forEach(function(id){document.getElementById(id).setAttribute("aria-pressed","false");});
  var map={learn:"btnLearn",feed:"btnFeed",status:"btnStatus",chal:"btnChal",rec:"btnRec",q:"btnQ"};
  if(map[tab])document.getElementById(map[tab]).setAttribute("aria-pressed","true");}

/* ===== まなぶ ===== */
function pickQuestion(){
  var all=ALLQ();
  var due=all.filter(function(Q){return isDue(Q.q);});
  if(due.length)return due[Math.floor(Math.random()*due.length)];
  var unseen=all.filter(function(Q){return !isSeen(Q.q);});
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)];
  var pending=all.filter(function(Q){var r=S.srs[Q.q];return r&&!r.graduated;});
  if(pending.length){pending.sort(function(a,b){return (S.srs[a.q].due||0)-(S.srs[b.q].due||0);});return pending[0];}
  return all[Math.floor(Math.random()*all.length)];
}
function renderExp(ex){
  var detailRow=ex.detail?'<div class="row"><div class="tag">くわしく</div><div class="body">'+e(ex.detail)+'</div></div>':"";
  var tatoeRow=ex.tatoe?'<div class="row tatoe"><div class="tag">たとえ🐰</div><div class="body">'+e(ex.tatoe)+'</div></div>':"";
  return '<div class="exp"><div class="row"><div class="tag">定義</div><div class="body">'+e(ex.def)+'</div></div>'+
    tatoeRow+detailRow+'<div class="row hito"><div class="tag">ひとこと</div><div class="body">'+e(ex.hito)+'</div></div></div>';
}

    b.innerHTML='<span class="key">'+keys[pos]+'</span><span>'+e(Q.ch[oi])+'</span>';
    b.onclick=function(){cb(oi,order,b);};wrap.appendChild(b);});
}
function markChoices(Q,order,btnEl,correct){
  var btns=[].slice.call(document.querySelectorAll("#choices .choice"));
  btns.forEach(function(b,pos){b.disabled=true;var oi=order[pos];if(oi===Q.a)b.classList.add("correct");if(b===btnEl&&!correct)b.classList.add("wrong");});
}
function panelLearn(){
  setTab("learn");var Q=pickQuestion();var review=isDue(Q.q);
  var diffChip=Q.diff==="hard"?'<span class="chip hard">🥕 むずかしい</span>':'<span class="chip easy">🌿 やさしい</span>';
  var revChip=review?'<span class="chip prog">🔁 復習</span>':"";
  document.getElementById("panel").innerHTML='<h2>📚 まなぶ</h2>'+
    '<div class="q-head">'+revChip+'<span class="chip cat">'+e(Q.cat)+'</span>'+diffChip+'</div>'+
    '<div class="q-text">'+e(Q.q)+'</div><div class="choices" id="choices"></div><div id="afterArea"></div>';
  renderChoices(Q,function(oi,order,b){answerLearn(Q,oi,order,b);});beep(740,0.05);
}
function answerLearn(Q,chosen,order,btnEl){
  var correct=chosen===Q.a;markChoices(Q,order,btnEl,correct);S.learned++;srsUpdate(Q.q,correct);
  var xpGain,rewardTxt;
  if(correct){S.correctTotal++;S.streak++;if(S.streak>S.best)S.best=S.streak;
    if(Q.diff==="hard"){S.carrot++;xpGain=15;rewardTxt="せいかい！ 🥕人参 +1（しっかり問題）";floatEmoji("🥕");}
    else{S.grass++;xpGain=10;rewardTxt="せいかい！ 🌿草 +1";floatEmoji("🌿");}
    if(S.streak%3===0){S.carrot++;rewardTxt+="　＋れんぞく3ボーナス 🥕+1！";floatEmoji("⭐");}
    S.mood=clamp(S.mood+5);hop();beep(880,0.08);beep(1180,0.08);
  }else{S.streak=0;xpGain=3;rewardTxt="ざんねん…でも まなびはXP+3。解説を見よう";beep(300,0.12,"sawtooth");}
  var before=stageIndex();S.xp+=xpGain;var after=stageIndex();var leveled=after>before;
  if(leveled){flash();floatEmoji("🎉");beep(660,0.1);beep(990,0.12);}
  logHist({t:Date.now(),k:"learn",cat:Q.cat,diff:Q.diff,q:Q.q,ok:correct,take:Q.exp.hito});
  document.getElementById("afterArea").innerHTML=
    '<div class="reward '+(correct?"":"miss")+'">'+e(rewardTxt)+'</div>'+
    (leveled?'<div class="reward" style="color:var(--gold)">✨ しんか！『'+e(STAGES[after].name)+'』になった！</div>':"")+
    renderExp(Q.exp)+'<button class="next" id="nextBtn">つぎの問題へ ▶</button>';
  document.getElementById("nextBtn").onclick=function(){panelLearn();};
  renderPet();renderStats();save();
}

/* ===== 10問チャレンジ ===== */
var CH=null;
function daPool(){var all=ALLQ(),a=[];for(var i=0;i<all.length;i++){if(all[i].da)a.push(all[i]);}return a;}
function panelChallenge(){
  setTab("chal");if(CH){renderChallengeQ();return;}
  document.getElementById("panel").innerHTML='<h2>🎮 データ分析 10問チャレンジ</h2>'+
    '<div class="muted">データ分析基礎からランダムに10問。スコアに応じて<b>首飾り</b>がもらえ、うさぎに装着できます🐰<br>'+
    '7問以上→🌸さくら ／ 9問→💧アクア ／ 満点→👑ゴールド！</div>'+dueBadge()+
    '<div class="record" style="grid-template-columns:repeat(2,1fr)">'+
    '<div class="rec"><b>'+S.challengeBest+'/10</b><span>ベストスコア</span></div>'+
    '<div class="rec"><b>'+S.necklaces.length+'/'+NECK_ORDER.length+'</b><span>集めた首飾り</span></div></div>'+
    '<button class="next alt" id="startChal">スタート ▶</button>';
  document.getElementById("startChal").onclick=startChallenge;beep(620,0.05);
}
function startChallenge(){
  var pool=daPool();
  if(pool.length<1){toast("データ分析の問題が見つかりません");return;}
  var due=pool.filter(function(Q){return isDue(Q.q);}).sort(function(){return Math.random()-0.5;});
  var rest=pool.filter(function(Q){return !isDue(Q.q);}).sort(function(){return Math.random()-0.5;});
  var list=due.concat(rest).slice(0,Math.min(10,pool.length)).sort(function(){return Math.random()-0.5;});
  CH={list:list,i:0,score:0};renderChallengeQ();
}
function renderChallengeQ(){
  setTab("chal");var Q=CH.list[CH.i];var revChip=isDue(Q.q)?'<span class="chip prog">🔁 復習</span>':"";
  document.getElementById("panel").innerHTML='<h2>🎮 チャレンジ</h2>'+
    '<div class="q-head"><span class="chip prog">第'+(CH.i+1)+'問 / '+CH.list.length+'</span>'+revChip+'<span class="chip cat">'+e(Q.cat)+'</span>'+
    '<span class="chip easy">スコア '+CH.score+'</span></div>'+
    '<div class="q-text">'+e(Q.q)+'</div><div class="choices" id="choices"></div><div id="afterArea"></div>';
  renderChoices(Q,function(oi,order,b){answerChallenge(Q,oi,order,b);});
}
function answerChallenge(Q,chosen,order,btnEl){
  var correct=chosen===Q.a;markChoices(Q,order,btnEl,correct);srsUpdate(Q.q,correct);
  if(correct){CH.score++;S.correctTotal++;floatEmoji("✨");beep(880,0.07);}else{beep(300,0.1,"sawtooth");}
  S.xp+=correct?6:2;
  logHist({t:Date.now(),k:"challenge-q",cat:Q.cat,diff:Q.diff,q:Q.q,ok:correct,take:Q.exp.hito});
  var last=CH.i>=CH.list.length-1;
  document.getElementById("afterArea").innerHTML='<div class="reward '+(correct?"":"miss")+'">'+(correct?"せいかい！":"おしい！")+'</div>'+
    '<div class="exp"><div class="row hito"><div class="tag">ひとこと</div><div class="body">'+e(Q.exp.hito)+'</div></div></div>'+
    '<button class="next alt" id="nextBtn">'+(last?"けっか を みる ▶":"つぎの問題へ ▶")+'</button>';
  document.getElementById("nextBtn").onclick=function(){if(last){finishChallenge();}else{CH.i++;renderChallengeQ();}};
  renderPet();renderStats();save();
}
function finishChallenge(){
  var sc=CH.score,type=neckForScore(sc),info=NECKS[type],isNew=S.necklaces.indexOf(type)<0;
  if(isNew)S.necklaces.push(type);S.equipped=type;if(sc>S.challengeBest)S.challengeBest=sc;
  logHist({t:Date.now(),k:"challenge",cat:"チャレンジ",diff:"-",q:"スコア "+sc+"/"+CH.list.length+" → "+info.em+info.name+(isNew?"（NEW）":""),ok:sc>=7,take:""});
  flash();floatEmoji("🎉");floatEmoji(info.em);beep(660,0.1);beep(990,0.12);if(sc>=9)beep(1320,0.12);
  renderPet();renderStats();save();
  var coll=NECK_ORDER.map(function(key){var own=S.necklaces.indexOf(key)>=0,ek=key===S.equipped;

/* ===== きろく・保存 ===== */
function fmtTs(t){var d=new Date(t);function p(n){return String(n).padStart(2,"0");}
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());}
function dateStamp(){var d=new Date();function p(n){return String(n).padStart(2,"0");}return ""+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate());}
function summaryObj(){var acc=S.learned>0?Math.round(S.correctTotal/Math.max(1,S.learned)*100):0;
  return{learned:S.learned,correct:S.correctTotal,acc:acc,stage:currentStage().name,xp:S.xp,best:S.best,
    chalBest:S.challengeBest,necks:S.necklaces.map(function(n){return NECKS[n]?NECKS[n].name:n;})};}
function kindLabel(k){return k==="learn"?"学習":k==="challenge-q"?"チャレンジ":k==="challenge"?"チャレンジ結果":k;}
function downloadBlob(name,mime,text){
  try{var blob=new Blob([text],{type:mime});var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},1500);toast(name+" を保存しました");}catch(err){toast("保存に失敗しました");}}
function buildMarkdown(){
  var s=summaryObj(),L=[];L.push("# うさうさ学習ログ 🐰");L.push("");L.push("生成: "+fmtTs(Date.now())+"  ／  うさうさ研修工房");
  L.push("");L.push("## サマリー");L.push("- 学んだ問題数: **"+s.learned+"**");L.push("- 正解数: **"+s.correct+"**（正答率 "+s.acc+"%）");
  L.push("- 現在の段階: **"+s.stage+"**（知識XP "+s.xp+"）");L.push("- さいこう連続正解: "+s.best);L.push("- チャレンジ最高: "+s.chalBest+"/10");
  L.push("- 集めた首飾り: "+(s.necks.length?s.necks.join("、"):"なし"));L.push("");L.push("## 学びの要点（ひとこと集）");
  var takes=S.history.filter(function(h){return h.k==="learn"&&h.ok&&h.take;});
  if(takes.length){takes.slice(-30).forEach(function(h){L.push("- ["+h.cat+"] "+h.q+" → **"+h.take+"**");});}else{L.push("- （まだ記録がありません）");}
  L.push("");L.push("## 履歴（新しい順・最大50件）");L.push("");L.push("| 日時 | 種別 | カテゴリ | 正誤 | 内容 |");L.push("|---|---|---|---|---|");
  S.history.slice(-50).reverse().forEach(function(h){L.push("| "+fmtTs(h.t)+" | "+kindLabel(h.k)+" | "+h.cat+" | "+(h.k==="challenge"?"-":(h.ok?"○":"×"))+" | "+String(h.q).replace(/\|/g,"/")+" |");});
  L.push("");L.push("## メモ（一時保存）");L.push("");L.push(S.memo?S.memo:"（メモなし）");L.push("");L.push("---");L.push("「面白きこともなき世を面白く」");
  return L.join("\n");}
function buildTxt(){

  if(takes.length){takes.slice(-30).forEach(function(h){L.push("・["+h.cat+"] "+h.q+" -> "+h.take);});}else{L.push("（なし）");}

function buildCsv(){

    '<button class="ghost" id="qImportBtn">📥 JSON読み込み</button>'+
    '<button class="ghost danger" id="qClear">🗑️ カスタムを全消去</button></div>'+
    '<input type="file" id="qImport" accept="application/json,.json" hidden>';

  // AI設定
  document.getElementById("apiSave").onclick=function(){
    try{localStorage.setItem("usausa_api_provider",document.getElementById("apiProv").value);
      localStorage.setItem("usausa_api_model",document.getElementById("apiModel").value.trim()||"gpt-4.1-mini");
      localStorage.setItem("usausa_api_key",document.getElementById("apiKey").value.trim());toast("API設定を保存しました");}catch(err){toast("保存に失敗しました");}};
  document.getElementById("apiClear").onclick=function(){try{localStorage.removeItem("usausa_api_key");document.getElementById("apiKey").value="";toast("APIキーを消去しました");}catch(err){}};

  // AI生成
  document.getElementById("genBtn").onclick=function(){
    var cfg2=apiCfg();
    if(!cfg2.key){toast("先に AI設定でAPIキーを入力してください（任意機能）");return;}
    var cat=document.getElementById("genCat").value,diff=document.getElementById("genDiff").value,n=parseInt(document.getElementById("genN").value,10);
    var btn=document.getElementById("genBtn");btn.disabled=true;btn.textContent="⏳ 生成中…";
    document.getElementById("genArea").innerHTML='<div class="muted" style="margin-top:8px">AIに問題を作ってもらっています…</div>';
    generateAI(cfg2,cat,diff,n).then(function(list){
      btn.disabled=false;btn.textContent="✨ 生成する";
      if(!list.length){document.getElementById("genArea").innerHTML='<div class="muted" style="margin-top:8px">うまく生成できませんでした。もう一度お試しください。</div>';return;}
      GENQ=list;renderGenPreview();
    }).catch(function(err){btn.disabled=false;btn.textContent="✨ 生成する";
      document.getElementById("genArea").innerHTML='<div class="muted" style="margin-top:8px">生成に失敗：'+e(String(err&&err.message?err.message:err))+'<br>キー・モデル・通信をご確認ください。</div>';});
  };

  // 手動追加
  document.getElementById("mAdd").onclick=function(){
    var q=document.getElementById("mQ").value.trim();
    var ch=[0,1,2,3].map(function(i){return document.getElementById("mc"+i).value.trim();});
    var ans=parseInt((document.querySelector('input[name="mans"]:checked')||{value:"0"}).value,10);
    var def=document.getElementById("mDef").value.trim(),hito=document.getElementById("mHito").value.trim(),tatoe=document.getElementById("mTatoe").value.trim();
    if(!q){toast("問題文を入力してください");return;}
    if(ch.some(function(x){return !x;})){toast("選択肢を4つ入力してください");return;}
    if(!def||!hito){toast("定義とひとことを入力してください");return;}
    var cat=document.getElementById("mCat").value,diff=document.getElementById("mDiff").value;
    var obj={cat:cat,diff:diff,q:q,ch:ch,a:ans,exp:{def:def,hito:hito},da:cat==="データ分析基礎"};
    if(tatoe)obj.exp.tatoe=tatoe;
    S.customQ.push(obj);save();toast("問題を追加しました（合計 "+ALLQ().length+"問）");panelQuestions();
  };

  // 入出力
  document.getElementById("qExport").onclick=function(){
    if(!S.customQ.length){toast("カスタム問題がありません");return;}
    downloadBlob("usausa_questions_"+dateStamp()+".json","application/json;charset=utf-8",JSON.stringify(S.customQ,null,2));};
  document.getElementById("qImportBtn").onclick=function(){document.getElementById("qImport").click();};
  document.getElementById("qImport").onchange=function(ev){
    var file=ev.target.files&&ev.target.files[0];if(!file)return;var rd=new FileReader();
    rd.onload=function(){try{var arr=JSON.parse(rd.result);if(!Array.isArray(arr))throw new Error("配列ではありません");
      var added=0;arr.forEach(function(o){var v=validateQ(o,o.cat||"その他");if(v){S.customQ.push(v);added++;}});
      save();toast(added+"問を読み込みました");panelQuestions();}catch(err){toast("読み込み失敗："+String(err.message||err));}};
    rd.readAsText(file);};
  document.getElementById("qClear").onclick=function(){if(!S.customQ.length){toast("カスタム問題はありません");return;}
    if(confirm("カスタム問題を全消去しますか？（内蔵問題は残ります）")){S.customQ=[];save();toast("カスタム問題を消去しました");panelQuestions();}};
  beep(560,0.05);
}
function renderGenPreview(){
  var html='<div class="muted" style="margin-top:10px">生成プレビュー（'+GENQ.length+'問）</div>';
  GENQ.forEach(function(o){html+='<div class="gen-row"><span class="gq">'+e(o.q)+'<br><span style="color:#7c766c">正解: '+e(o.ch[o.a])+'</span></span><span class="ga">'+e(o.diff)+'</span></div>';});
  html+='<div class="row-actions"><button class="ghost ok" id="genAdd">＋ ぜんぶ追加</button><button class="ghost" id="genDiscard">破棄</button></div>';
  document.getElementById("genArea").innerHTML=html;
  document.getElementById("genAdd").onclick=function(){GENQ.forEach(function(o){S.customQ.push(o);});save();toast(GENQ.length+"問を追加しました（合計 "+ALLQ().length+"問）");GENQ=null;panelQuestions();};
  document.getElementById("genDiscard").onclick=function(){GENQ=null;document.getElementById("genArea").innerHTML="";toast("破棄しました");};
}
function validateQ(o,cat){
  if(!o||typeof o.q!=="string"||!o.q.trim())return null;
  if(!Array.isArray(o.ch)||o.ch.length!==4)return null;
  if(o.ch.some(function(x){return typeof x!=="string"||!x.trim();}))return null;
  var a=typeof o.a==="number"?o.a:parseInt(o.a,10);if(isNaN(a)||a<0||a>3)return null;
  var exp=o.exp||{};if(typeof exp.def!=="string"||!exp.def.trim())return null;
  var hito=typeof exp.hito==="string"&&exp.hito.trim()?exp.hito:exp.def;
  var c=o.cat||cat||"その他";var diff=(o.diff==="hard")?"hard":"easy";
  var out={cat:c,diff:diff,q:o.q.trim(),ch:o.ch.map(function(x){return x.trim();}),a:a,exp:{def:exp.def.trim(),hito:String(hito).trim()},da:c==="データ分析基礎"};
  if(typeof exp.tatoe==="string"&&exp.tatoe.trim())out.exp.tatoe=exp.tatoe.trim();
  if(typeof exp.detail==="string"&&exp.detail.trim())out.exp.detail=exp.detail.trim();
  return out;
}
function genPrompt(cat,diff,n){
  var dtxt=diff==="easy"?"やさしい":diff==="hard"?"むずかしい":"やさしい〜むずかしいを混ぜて";
  return "あなたはデータ分析・BI・Tableauの試験問題作成のプロです。"+
    "テーマ「"+cat+"」について、"+dtxt+"難易度の4択問題を"+n+"問、日本語で作成してください。"+
    "事実に基づき、曖昧・主観的な問題は避けること。"+
    "出力は次のスキーマのJSON配列のみ。前後の説明やコードフェンス(```)は一切付けないこと。"+
    '[{"cat":"'+cat+'","diff":"easy|hard","q":"問題文","ch":["A","B","C","D"],"a":正解の0始まりindex,"exp":{"def":"定義・解説","tatoe":"身近なたとえ(任意)","hito":"一言まとめ"}}]';
}
function parseGenerated(text,cat){
  var t=String(text).replace(/```json/gi,"").replace(/```/g,"").trim();
  var i=t.indexOf("["),j=t.lastIndexOf("]");if(i>=0&&j>i)t=t.slice(i,j+1);
  var arr;try{arr=JSON.parse(t);}catch(err){return[];}
  if(!Array.isArray(arr))return[];
  var out=[];arr.forEach(function(o){var v=validateQ(o,cat);if(v)out.push(v);});return out;
}
function generateAI(cfg,cat,diff,n){
  var sys="あなたは丁寧なデータ分析・BI・Tableauの講師です。";
  var usr=genPrompt(cat,diff,n);
  if(cfg.provider==="anthropic"){
    return fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"content-type":"application/json","x-api-key":cfg.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:cfg.model||"claude-3-5-haiku-latest",max_tokens:2000,messages:[{role:"user",content:sys+"\n\n"+usr}]})
    }).then(function(r){return r.json();}).then(function(d){
      var txt="";if(d&&d.content&&d.content.length){d.content.forEach(function(b){if(b.type==="text")txt+=b.text;});}
      if(d&&d.error)throw new Error(d.error.message||"APIエラー");
      return parseGenerated(txt,cat);});
  }
  return fetch("https://api.openai.com/v1/chat/completions",{method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+cfg.key},
    body:JSON.stringify({model:cfg.model||"gpt-4.1-mini",temperature:0.7,messages:[{role:"system",content:sys},{role:"user",content:usr}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d&&d.error)throw new Error(d.error.message||"APIエラー");
    var txt=(d&&d.choices&&d.choices[0]&&d.choices[0].message)?d.choices[0].message.content:"";
    return parseGenerated(txt,cat);});
}
